name: Windows Desktop Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-desktop:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check Gradle installation
        shell: pwsh
        run: gradle --version

      - name: Build MSI
        shell: pwsh
        run: gradle :composeApp:packageReleaseMsi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ppix-windows-msi
          path: composeApp/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error
